name: Code Review & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  code-review:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: 'backend/requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run ruff (code formatting)
      run: |
        cd backend
        ruff check --output-format=github --config ../.ruff.toml .

    - name: Run mypy (type checking)
      run: |
        cd backend
        mypy --config-file ../pyproject.toml --install-types --non-interactive .

    - name: Run bandit (security scanning)
      run: |
        cd backend
        bandit -r . -c ../.bandit.yaml -f json -o bandit-results.json

    - name: Run tests with coverage
      continue-on-error: true
      run: |
        cd backend
        python -m pytest -v --cov=app --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      if: secrets.CODECOV_TOKEN
      uses: codecov/codecov-action@v3
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}